    ptsPerGame: 'Body / zápas', pts: 'Body celkem',
    rebPerGame: 'Doskoky / zápas', orebPerGame: 'Útočné doskoky / zápas',
    drebPerGame: 'Obranné doskoky / zápas',

    ortg: 'ORTG', drtg: 'DRTG', netRtg: 'Net RTG', pace: 'Pace',
};

// These categories are "lower = better"
const LOWER_IS_BETTER = new Set(['tovPerGame', 'drtg', 'opp_ptsPerGame',
    'opp_fgPct', 'opp_fg3Pct', 'opp_rebPerGame']);

let cat = 'ptsPerGame';

function fmt(v, decimals=1) {
    if (v === null || v === undefined) return '-';
    if (typeof v === 'number') {
        if (Number.isInteger(v) && decimals === 0) return v.toString();
        return v.toFixed(decimals);
    }
    return v;
}

function render() {
    const lowerBetter = LOWER_IS_BETTER.has(cat);
    let sorted = [...TEAMS];
    sorted.sort((a, b) => {
        const va = a[cat] ?? 0, vb = b[cat] ?? 0;
        return lowerBetter ? va - vb : vb - va;
    });

    document.getElementById('val-header').textContent = CAT_LABELS[cat] || cat;

    const tbody = document.getElementById('lb-body');
    tbody.innerHTML = sorted.map((t, i) => {
        const rank = i + 1;
        const rankClass = rank <= 3 ? ` rank-${rank}` : '';
        const val = t[cat];
        const isFloat = typeof val === 'number' && !Number.isInteger(val);
        const valFmt = isFloat ? val.toFixed(1) : (val ?? '-');

        let valClass = '';
        if (cat === 'netRtg' && typeof val === 'number') {
            valClass = val > 0 ? 'positive' : val < 0 ? 'negative' : '';
        }

        return `<tr class="${rankClass}">
            <td>${rank}</td>
            <td>${t.name}</td>
            <td>${t.gp}</td>
            <td>${t.wins}–${t.losses}</td>
            <td><span class="val-main ${valClass}">${valFmt}</span></td>
        </tr>`;
    }).join('');
}

document.getElementById('cat-select').addEventListener('change', e => {
    cat = e.target.value;
    render();
});

render();
