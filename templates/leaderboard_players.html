<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard hráčů {{ season }} | NBL Rotations</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .lb-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .lb-controls label { color: #888; font-size: 0.85rem; }
        .lb-controls select {
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px 8px;
        }
        .min-btns { display: flex; gap: 4px; }
        .min-btn {
            padding: 4px 10px;
            background: #16213e;
            border: 1px solid #333;
            border-radius: 4px;
            color: #888;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .min-btn:hover { background: #1a2a50; color: #ccc; }
        .min-btn.active { background: #1a3a8b; color: #fff; border-color: #1a3a8b; }
        #min-filter { transition: opacity 0.15s; }
        .lb-table-wrap { overflow-x: auto; }
        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 0.88rem;
        }
        thead th {
            background: #16213e;
            color: #888;
            font-weight: normal;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
            padding: 8px 14px;
            text-align: right;
            border-bottom: 1px solid #333;
        }
        thead th:nth-child(2), thead th:nth-child(3) { text-align: left; }
        tbody tr { border-bottom: 1px solid #222; transition: background 0.1s; }
        tbody tr:hover { background: #16213e; }
        tbody td { padding: 9px 14px; text-align: right; color: #ccc; }
        tbody td:first-child { color: #555; font-size: 0.78rem; }
        tbody td:nth-child(2) { text-align: left; }
        tbody td:nth-child(3) { text-align: left; color: #888; font-size: 0.82rem; }
        tbody td a { color: #6a9fd8; text-decoration: none; }
        tbody td a:hover { text-decoration: underline; }
        .val-main { font-size: 1.05rem; font-weight: bold; color: #fff; }
        .val-best { font-size: 0.78rem; color: #888; }
        .rank-1 td:first-child { color: #f0c040; font-weight: bold; }
        .rank-2 td:first-child { color: #aaa; }
        .rank-3 td:first-child { color: #c08040; }
        .positive { color: #4caf50; font-weight: bold; }
        .negative { color: #e57373; font-weight: bold; }
        .col-sep { border-left: 1px solid #2a2a3a; }
    </style>
</head>
<body>
{% include '_nav.html' %}
<div class="container">
    <h1>Leaderboard hráčů NBL {{ season }}</h1>

    <div class="lb-controls">
        <label>Kategorie:
            <select id="cat-select">
                <optgroup label="Základní">
                    <option value="ptsPerGame">Body / zápas</option>
                    <option value="pts">Body celkem</option>
                    <option value="rebPerGame">Doskoky / zápas</option>
                    <option value="reb">Doskoky celkem</option>
                    <option value="orebPerGame">Útočné doskoky / zápas</option>
                    <option value="drebPerGame">Obranné doskoky / zápas</option>
                    <option value="astPerGame">Asistence / zápas</option>
                    <option value="ast">Asistence celkem</option>
                    <option value="stlPerGame">Zisky / zápas</option>
                    <option value="stl">Zisky celkem</option>
                    <option value="blkPerGame">Bloky / zápas</option>
                    <option value="blk">Bloky celkem</option>
                    <option value="tovPerGame">Ztráty / zápas</option>
                    <option value="plusMinus">+/- celkem</option>
                    <option value="plusMinusPerGame">+/- / zápas</option>
                </optgroup>
                <optgroup label="Střelba">
                    <option value="fgPct">FG%</option>
                    <option value="fgm">FGM celkem</option>
                    <option value="fga">FGA celkem</option>
                    <option value="fg2Pct">2P%</option>
                    <option value="fg2m">2PM celkem</option>
                    <option value="fg2PerGame">2P / zápas</option>
                    <option value="fg3Pct">3P%</option>
                    <option value="fg3m">3PM celkem</option>
                    <option value="fg3a">3PA celkem</option>
                    <option value="fg3PerGame">3P / zápas</option>
                    <option value="ftPct">FT%</option>
                    <option value="ftm">FTM celkem</option>
                    <option value="fta">FTA celkem</option>
                    <option value="ftmPerGame">FTM / zápas</option>
                    <option value="ftPerGame">FTA / zápas</option>
                </optgroup>
                <optgroup label="Pokročilé">
                    <option value="per">PER</option>
                    <option value="tsPct">TS%</option>
                    <option value="efgPct">eFG%</option>
                    <option value="usagePct">USG%</option>
                </optgroup>
                <optgroup label="Individuální čísla">
                    <option value="doubleDoubles">Double-doubles</option>
                    <option value="tripleDoubles">Triple-doubles</option>
                    <option value="foulsOut">Foul-outy</option>
                    <option value="technical">Technické chyby</option>
                </optgroup>
                <optgroup label="Ratingy">
                    <option value="on_net">ON Net Rating</option>
                    <option value="delta_net">Δ Net Rating</option>
                    <option value="on_ortg">ON ORTG</option>
                    <option value="on_drtg">ON DRTG</option>
                </optgroup>
            </select>
        </label>
        <div id="min-filter">
            <label>Min. zápasů:</label>
            <div class="min-btns">
                <button class="min-btn active" data-pct="0">Vše</button>
                <button class="min-btn" data-pct="0.1">10%+</button>
                <button class="min-btn" data-pct="0.33">33%+</button>
                <button class="min-btn" data-pct="0.66">66%+</button>
            </div>
        </div>
    </div>

    <div class="lb-table-wrap">
        <table>
            <thead id="lb-head">
                <tr>
                    <th>#</th>
                    <th>Hráč</th>
                    <th>Tým</th>
                    <th>GP</th>
                    <th id="val-header">Body / zápas</th>
                    <th>Best</th>
                    <th>Zápas</th>
                </tr>
            </thead>
            <tbody id="lb-body"></tbody>
        </table>
    </div>
</div>

<script>
const PLAYERS = {{ players_json }};
const GAME_META = {{ game_meta_json }};
const RATINGS = {{ ratings_json }};

const RATING_CATS = new Set(['on_net', 'delta_net', 'on_ortg', 'on_drtg']);

const CAT_LABELS = {
    ptsPerGame: 'Body / zápas', pts: 'Body celkem',
    rebPerGame: 'Doskoky / zápas', reb: 'Doskoky celkem',
    orebPerGame: 'Útočné doskoky / zápas', drebPerGame: 'Obranné doskoky / zápas',
    astPerGame: 'Asistence / zápas', ast: 'Asistence celkem',
    stlPerGame: 'Zisky / zápas', stl: 'Zisky celkem',
    blkPerGame: 'Bloky / zápas', blk: 'Bloky celkem',
    tovPerGame: 'Ztráty / zápas',
    plusMinus: '+/- celkem', plusMinusPerGame: '+/- / zápas',
    fgPct: 'FG%', fgm: 'FGM', fga: 'FGA',
    fg2Pct: '2P%', fg2m: '2PM', fg2PerGame: '2P / zápas',
    fg3Pct: '3P%', fg3m: '3PM', fg3a: '3PA', fg3PerGame: '3P / zápas',
    ftPct: 'FT%', ftm: 'FTM', fta: 'FTA', ftmPerGame: 'FTM / zápas', ftPerGame: 'FTA / zápas',
    per: 'PER', tsPct: 'TS%', efgPct: 'eFG%', usagePct: 'USG%',
    doubleDoubles: 'Double-doubles', tripleDoubles: 'Triple-doubles',
    foulsOut: 'Foul-outy', technical: 'Technické chyby',
    on_net: 'ON Net Rating', delta_net: 'Δ Net Rating',
    on_ortg: 'ON ORTG', on_drtg: 'ON DRTG',
};

// Best game stat mapping
const BEST_KEY = {
    ptsPerGame: 'pts', pts: 'pts',
    rebPerGame: 'reb', reb: 'reb', orebPerGame: 'oreb', drebPerGame: 'dreb',
    astPerGame: 'ast', ast: 'ast',
    stlPerGame: 'stl', stl: 'stl',
    blkPerGame: 'blk', blk: 'blk',
    fgm: 'fgm', fga: 'fga', fg2m: 'fg2m', fg2PerGame: 'fg2m',
    fg3m: 'fg3m', fg3a: 'fg3a', fg3PerGame: 'fg3m',
    ftm: 'ftm', fta: 'fta', ftmPerGame: 'ftm', ftPerGame: 'fta',
    plusMinus: 'plus_minus', plusMinusPerGame: 'plus_minus',
};

let cat = 'ptsPerGame';
let minGpPct = 0;
const maxGP = Math.max(...PLAYERS.filter(p => p.gp > 0).map(p => p.gp));

function fmt(v, decimals=1) {
    if (v === null || v === undefined) return '-';
    if (typeof v === 'number') {
        if (Number.isInteger(v)) return v.toString();
        return v.toFixed(decimals);
    }
    return v;
}

function fmtRtg(v) {
    if (v === null || v === undefined) return '<span style="color:#555">–</span>';
    return v.toFixed(1);
}

function fmtDelta(v) {
    if (v === null || v === undefined) return '<span style="color:#555">–</span>';
    const cls = v > 0 ? 'positive' : v < 0 ? 'negative' : '';
    const sign = v > 0 ? '+' : '';
    return cls ? `<span class="${cls}">${sign}${v.toFixed(1)}</span>` : `${sign}${v.toFixed(1)}`;
}

function gameRef(gameId) {
    if (!gameId || !GAME_META[gameId]) return gameId || '-';
    const m = GAME_META[gameId];
    const parts = m.date ? m.date.split('-') : [];
    const dateStr = parts.length === 3 ? `${parseInt(parts[2])}.${parseInt(parts[1])}.${parts[0]}` : '';
    const label = `${m.team1} – ${m.team2}`;
    const score = `${m.score1}:${m.score2}`;
    return `<a href="../../game/${gameId}.html">${label} ${score}${dateStr ? ' (' + dateStr + ')' : ''}</a>`;
}

function renderStandard() {
    document.getElementById('lb-head').innerHTML = `<tr>
        <th>#</th><th>Hráč</th><th>Tým</th><th>GP</th>
        <th id="val-header">${CAT_LABELS[cat] || cat}</th>
        <th>Best</th><th>Zápas</th>
    </tr>`;

    const minGP = Math.round(minGpPct * maxGP);
    const filtered = PLAYERS
        .filter(p => p.gp > 0 && p.gp >= minGP)
        .sort((a, b) => (b[cat] ?? 0) - (a[cat] ?? 0))
        .slice(0, 20);

    const bestKey = BEST_KEY[cat];
    document.getElementById('lb-body').innerHTML = filtered.map((p, i) => {
        const rank = i + 1;
        const rankClass = rank <= 3 ? ` rank-${rank}` : '';
        const val = p[cat];
        const isFloat = typeof val === 'number' && !Number.isInteger(val);
        const valFmt = isFloat ? val.toFixed(1) : (val ?? '-');

        let bestVal = '-', bestGame = '-';
        if (bestKey && p.best && p.best[bestKey]) {
            const b = p.best[bestKey];
            bestVal = b.value;
            bestGame = gameRef(b.game_id);
        }

        return `<tr class="${rankClass}">
            <td>${rank}</td>
            <td><a href="../../player/{{ season }}/${p.slug}.html">${p.firstName} ${p.familyName}</a></td>
            <td>${p.team}</td>
            <td>${p.gp}</td>
            <td><span class="val-main">${valFmt}</span></td>
            <td class="val-best">${bestVal}</td>
            <td class="val-best">${bestGame}</td>
        </tr>`;
    }).join('');
}

function renderRatings() {
    const ascCats = new Set(['on_drtg']);
    document.getElementById('lb-head').innerHTML = `<tr>
        <th>#</th><th>Hráč</th><th>Tým</th>
        <th>ON min</th><th>ON ORTG</th><th>ON DRTG</th><th>ON Net</th>
        <th class="col-sep">OFF min</th><th>OFF Net</th>
        <th class="col-sep">Δ Net</th>
    </tr>`;

    const sorted = [...RATINGS]
        .filter(p => p[cat] !== null && p[cat] !== undefined)
        .sort((a, b) => ascCats.has(cat) ? a[cat] - b[cat] : b[cat] - a[cat])
        .slice(0, 20);

    document.getElementById('lb-body').innerHTML = sorted.map((p, i) => {
        const rank = i + 1;
        const rankClass = rank <= 3 ? ` rank-${rank}` : '';
        return `<tr class="${rankClass}">
            <td>${rank}</td>
            <td><a href="../../player/${p.season}/${p.slug}.html">${p.first_name} ${p.family_name}</a></td>
            <td style="color:#888;font-size:0.82rem">${p.team}</td>
            <td>${p.on_min}</td>
            <td>${fmtRtg(p.on_ortg)}</td>
            <td>${fmtRtg(p.on_drtg)}</td>
            <td><strong>${fmtRtg(p.on_net)}</strong></td>
            <td class="col-sep">${p.off_min || '–'}</td>
            <td>${fmtRtg(p.off_net)}</td>
            <td class="col-sep">${fmtDelta(p.delta_net)}</td>
        </tr>`;
    }).join('');
}

function render() {
    const isRating = RATING_CATS.has(cat);
    document.getElementById('min-filter').style.opacity = isRating ? '0.3' : '1';
    document.getElementById('min-filter').style.pointerEvents = isRating ? 'none' : '';
    if (isRating) renderRatings();
    else renderStandard();
}

document.getElementById('cat-select').addEventListener('change', e => {
    cat = e.target.value;
    render();
});

document.querySelectorAll('.min-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.min-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        minGpPct = +btn.dataset.pct;
        render();
    });
});

render();
</script>
</body>
</html>
