<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard týmů {{ season }} | NBL Rotations</title>
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .lb-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .lb-controls label { color: #888; font-size: 0.85rem; }
        .lb-controls select {
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px 8px;
        }
        .lb-table-wrap { overflow-x: auto; }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 600px;
            font-size: 0.88rem;
        }
        thead th {
            background: #16213e;
            color: #888;
            font-weight: normal;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: 0.5px;
            padding: 8px 14px;
            text-align: right;
            border-bottom: 1px solid #333;
        }
        thead th:nth-child(2) { text-align: left; }
        tbody tr { border-bottom: 1px solid #222; transition: background 0.1s; }
        tbody tr:hover { background: #16213e; }
        tbody td { padding: 9px 14px; text-align: right; color: #ccc; }
        tbody td:first-child { color: #555; font-size: 0.78rem; }
        tbody td:nth-child(2) { text-align: left; }
        .val-main { font-size: 1.05rem; font-weight: bold; color: #fff; }
        .rank-1 td:first-child { color: #f0c040; font-weight: bold; }
        .rank-2 td:first-child { color: #aaa; }
        .rank-3 td:first-child { color: #c08040; }
        .positive { color: #4caf50; }
        .negative { color: #ef5350; }
    </style>
</head>
<body>
{% include '_nav.html' %}
<div class="container">
    <h1>Leaderboard týmů NBL {{ season }}</h1>

    <div class="lb-controls">
        <label>Kategorie:
            <select id="cat-select">
                <optgroup label="Základní">
                    <option value="ptsPerGame">Body / zápas</option>
                    <option value="pts">Body celkem</option>
                    <option value="rebPerGame">Doskoky / zápas</option>
                    <option value="orebPerGame">Útočné doskoky / zápas</option>
                    <option value="drebPerGame">Obranné doskoky / zápas</option>
                    <option value="astPerGame">Asistence / zápas</option>
                    <option value="stlPerGame">Zisky / zápas</option>
                    <option value="blkPerGame">Bloky / zápas</option>
                    <option value="tovPerGame">Ztráty / zápas</option>
                    <option value="opp_ptsPerGame">Inkasované body / zápas</option>
                </optgroup>
                <optgroup label="Střelba">
                    <option value="fgPct">FG%</option>
                    <option value="fg2Pct">2P%</option>
                    <option value="fg3Pct">3P%</option>
                    <option value="fg3mPerGame">3PM / zápas</option>
                    <option value="fg3aPerGame">3PA / zápas</option>
                    <option value="ftPct">FT%</option>
                    <option value="ftaPerGame">FTA / zápas</option>
                </optgroup>
                <optgroup label="Soupeř">
                    <option value="opp_fgPct">Soupeř FG%</option>
                    <option value="opp_fg3Pct">Soupeř 3P%</option>
                    <option value="opp_rebPerGame">Soupeř doskoky / zápas</option>
                    <option value="opp_tovPerGame">Soupeř ztráty / zápas</option>
                </optgroup>
                <optgroup label="Pokročilé">
                    <option value="ortg">ORTG</option>
                    <option value="drtg">DRTG</option>
                    <option value="netRtg">Net RTG</option>
                    <option value="pace">Pace</option>
                </optgroup>
            </select>
        </label>
    </div>

    <div class="lb-table-wrap">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Tým</th>
                    <th>GP</th>
                    <th>W–L</th>
                    <th id="val-header">Body / zápas</th>
                </tr>
            </thead>
            <tbody id="lb-body"></tbody>
        </table>
    </div>
</div>

<script>
const TEAMS = {{ teams_json }};

const CAT_LABELS = {
    ptsPerGame: 'Body / zápas', pts: 'Body celkem',
    rebPerGame: 'Doskoky / zápas', orebPerGame: 'Útočné doskoky / zápas',
    drebPerGame: 'Obranné doskoky / zápas',
    astPerGame: 'Asistence / zápas',
    stlPerGame: 'Zisky / zápas', blkPerGame: 'Bloky / zápas',
    tovPerGame: 'Ztráty / zápas', opp_ptsPerGame: 'Inkasované body / zápas',
    fgPct: 'FG%', fg2Pct: '2P%', fg3Pct: '3P%',
    fg3mPerGame: '3PM / zápas', fg3aPerGame: '3PA / zápas',
    ftPct: 'FT%', ftaPerGame: 'FTA / zápas',
    opp_fgPct: 'Soupeř FG%', opp_fg3Pct: 'Soupeř 3P%',
    opp_rebPerGame: 'Soupeř doskoky / zápas', opp_tovPerGame: 'Soupeř ztráty / zápas',
    ortg: 'ORTG', drtg: 'DRTG', netRtg: 'Net RTG', pace: 'Pace',
};

// These categories are "lower = better"
const LOWER_IS_BETTER = new Set(['tovPerGame', 'drtg', 'opp_ptsPerGame',
    'opp_fgPct', 'opp_fg3Pct', 'opp_rebPerGame']);

let cat = 'ptsPerGame';

function fmt(v, decimals=1) {
    if (v === null || v === undefined) return '-';
    if (typeof v === 'number') {
        if (Number.isInteger(v) && decimals === 0) return v.toString();
        return v.toFixed(decimals);
    }
    return v;
}

function render() {
    const lowerBetter = LOWER_IS_BETTER.has(cat);
    let sorted = [...TEAMS];
    sorted.sort((a, b) => {
        const va = a[cat] ?? 0, vb = b[cat] ?? 0;
        return lowerBetter ? va - vb : vb - va;
    });

    document.getElementById('val-header').textContent = CAT_LABELS[cat] || cat;

    const tbody = document.getElementById('lb-body');
    tbody.innerHTML = sorted.map((t, i) => {
        const rank = i + 1;
        const rankClass = rank <= 3 ? ` rank-${rank}` : '';
        const val = t[cat];
        const isFloat = typeof val === 'number' && !Number.isInteger(val);
        const valFmt = isFloat ? val.toFixed(1) : (val ?? '-');

        let valClass = '';
        if (cat === 'netRtg' && typeof val === 'number') {
            valClass = val > 0 ? 'positive' : val < 0 ? 'negative' : '';
        }

        return `<tr class="${rankClass}">
            <td>${rank}</td>
            <td>${t.name}</td>
            <td>${t.gp}</td>
            <td>${t.wins}–${t.losses}</td>
            <td><span class="val-main ${valClass}">${valFmt}</span></td>
        </tr>`;
    }).join('');
}

document.getElementById('cat-select').addEventListener('change', e => {
    cat = e.target.value;
    render();
});

render();
</script>
</body>
</html>
