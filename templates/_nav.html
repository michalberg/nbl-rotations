<nav class="site-nav" id="site-nav">
    <div class="site-nav-inner">
        <a href="{{ nav_base }}index.html" class="nav-brand">NBL data</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="nav-links">
            <a href="{{ nav_base }}index.html" class="nav-link{% if nav_active == 'games' %} active{% endif %}">Zápasy</a>
            <a href="{{ nav_base }}player/index.html" class="nav-link{% if nav_active == 'players' %} active{% endif %}">Hráči</a>
            <a href="{{ nav_base }}stats/{{ nav_season }}/players.html" class="nav-link{% if nav_active == 'stats-players' %} active{% endif %}">Statistiky hráčů</a>
            <a href="{{ nav_base }}leaderboard/{{ nav_season }}/players.html" class="nav-link{% if nav_active == 'leaderboard-players' %} active{% endif %}">TOP hráči</a>
            <a href="{{ nav_base }}stats/{{ nav_season }}/teams.html" class="nav-link{% if nav_active == 'stats-teams' %} active{% endif %}">Statistiky týmů</a>
            <a href="{{ nav_base }}leaderboard/{{ nav_season }}/teams.html" class="nav-link{% if nav_active == 'leaderboard-teams' %} active{% endif %}">TOP týmy</a>
            <a href="{{ nav_base }}stats/{{ nav_season }}/top_games.html" class="nav-link{% if nav_active == 'top-games' %} active{% endif %}">TOP zápasy</a>
            <a href="{{ nav_base }}stats/{{ nav_season }}/top_performances.html" class="nav-link{% if nav_active == 'top-performances' %} active{% endif %}">TOP výkony</a>
            <a href="{{ nav_base }}stats/{{ nav_season }}/milestones.html" class="nav-link{% if nav_active == 'milestones' %} active{% endif %}">Milníky</a>
            <a href="{{ nav_base }}stats/{{ nav_season }}/ratings.html" class="nav-link{% if nav_active == 'ratings' %} active{% endif %}">Ratings</a>
        </div>
    </div>
</nav>
<script>
(function() {
    var btn = document.getElementById('nav-toggle');
    var links = document.getElementById('nav-links');
    if (!btn || !links) return;
    btn.addEventListener('click', function() {
        var open = links.classList.toggle('open');
        btn.classList.toggle('open', open);
        btn.setAttribute('aria-expanded', open);
    });
    document.addEventListener('click', function(e) {
        if (!document.getElementById('site-nav').contains(e.target)) {
            links.classList.remove('open');
            btn.classList.remove('open');
            btn.setAttribute('aria-expanded', 'false');
        }
    });
})();
</script>
